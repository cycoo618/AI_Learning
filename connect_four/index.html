<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONNECT FOUR · 四子棋</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #06060f;
      --board:       #0d2580;
      --board-hi:    #1537b8;
      --board-lo:    #07175a;
      --hole:        #04080f;
      --red:         #ff2d55;
      --red-glow:    rgba(255,45,85,.65);
      --yel:         #ffd60a;
      --yel-glow:    rgba(255,214,10,.65);
      --cyan:        #4cc9ff;
      --text:        #dde8ff;
      --dim:         rgba(221,232,255,.35);
      --cell:        62px;
      --gap:         8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 32px;
      gap: 0;
    }

    /* CRT scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* Ambient halo */
    #halo {
      position: fixed;
      top: 50%; left: 50%;
      translate: -50% -50%;
      width: 900px; height: 600px;
      background: radial-gradient(ellipse,
        rgba(13,37,128,.35) 0%,
        transparent 70%
      );
      pointer-events: none;
    }

    /* ── Title ── */
    h1 {
      font-family: 'Bungee', cursive;
      font-size: clamp(1.8rem, 6vw, 3.2rem);
      letter-spacing: 6px;
      color: var(--cyan);
      text-shadow: 0 0 18px rgba(76,201,255,.9), 0 0 60px rgba(76,201,255,.3);
      margin-bottom: 2px;
    }

    #sub {
      font-size: .65rem;
      letter-spacing: 5px;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    /* ── Turn indicator ── */
    #turn-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 18px;
      height: 28px;
    }

    .pip {
      width: 18px; height: 18px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: box-shadow .3s, background .3s;
    }
    .pip.red {
      background: var(--red);
      box-shadow: 0 0 10px var(--red-glow);
    }
    .pip.yel {
      background: var(--yel);
      box-shadow: 0 0 10px var(--yel-glow);
    }
    .pip.inactive {
      opacity: .25;
      box-shadow: none;
    }

    #turn-text { color: var(--cyan); }

    /* ── Board ── */
    #wrap { position: relative; }

    #arrows {
      display: grid;
      grid-template-columns: repeat(7, var(--cell));
      gap: var(--gap);
      padding: 0 12px;
      margin-bottom: 6px;
    }

    .arrow-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: background .15s;
    }
    .arrow-btn::before {
      content: '▼';
      font-size: 13px;
      color: rgba(76,201,255,.35);
      transition: color .2s, transform .2s;
    }
    .arrow-btn:not(:disabled):hover::before {
      color: rgba(76,201,255,.9);
      transform: translateY(3px);
    }
    .arrow-btn.hover-red::before   { color: rgba(255,45,85,.9) !important; }
    .arrow-btn.hover-yel::before   { color: rgba(255,214,10,.9) !important; }
    .arrow-btn:disabled::before    { color: rgba(76,201,255,.1) !important; }
    .arrow-btn:disabled { cursor: default; }

    /* cells are also clickable */
    .cell { cursor: pointer; }
    .cell:hover { filter: brightness(1.15); }

    #board {
      background: linear-gradient(145deg, var(--board-hi), var(--board) 50%, var(--board-lo));
      border-radius: 16px;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(7, var(--cell));
      grid-template-rows: repeat(6, var(--cell));
      gap: var(--gap);
      box-shadow:
        0 24px 64px rgba(0,0,0,.85),
        0 0 0 1.5px rgba(76,201,255,.12),
        inset 0 1px 0 rgba(255,255,255,.1);
      overflow: hidden; /* clip flying pieces to board bounds */
    }

    .cell {
      width: var(--cell);
      height: var(--cell);
      border-radius: 50%;
      background: var(--hole);
      box-shadow:
        inset 0 4px 14px rgba(0,0,0,.9),
        inset 0 1px 4px rgba(0,0,0,.6);
      position: relative;
      /* no overflow:hidden — allows piece to animate from above */
    }

    .piece {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      animation-name: fall;
      animation-timing-function: cubic-bezier(.33,1,.68,1);
      animation-fill-mode: forwards;
    }

    @keyframes fall {
      0%   { transform: translateY(var(--start-y, -400px)); }
      72%  { transform: translateY(5px); }
      86%  { transform: translateY(-3px); }
      100% { transform: translateY(0); }
    }

    .piece.red {
      background: radial-gradient(circle at 36% 34%, #ff7090, var(--red) 52%, #8b0a25);
      box-shadow:
        0 0 18px var(--red-glow),
        inset 0 2px 5px rgba(255,255,255,.28);
    }
    .piece.yel {
      background: radial-gradient(circle at 36% 34%, #ffe870, var(--yel) 52%, #8b6a00);
      box-shadow:
        0 0 18px var(--yel-glow),
        inset 0 2px 5px rgba(255,255,255,.35);
    }

    .piece.winner {
      animation: winner-pulse .55s ease-in-out infinite alternate;
    }
    @keyframes winner-pulse {
      from { filter: brightness(1) saturate(1);  transform: scale(1); }
      to   { filter: brightness(1.55) saturate(1.3); transform: scale(1.08); }
    }

    /* ── Scores ── */
    #scores {
      display: flex;
      align-items: center;
      gap: 36px;
      margin-top: 26px;
    }

    .sc {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .sc-num {
      font-family: 'Bungee', cursive;
      font-size: 2.2rem;
      line-height: 1;
    }
    .sc-num.red { color: var(--red); text-shadow: 0 0 18px var(--red-glow); }
    .sc-num.yel { color: var(--yel); text-shadow: 0 0 18px var(--yel-glow); }

    .sc-label {
      font-size: .6rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--dim);
    }

    .sc-sep {
      font-size: .6rem;
      letter-spacing: 2px;
      color: rgba(221,232,255,.15);
      text-transform: uppercase;
    }

    /* ── Status ── */
    #status {
      margin-top: 14px;
      font-size: .72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      height: 1.4em;
      text-align: center;
      transition: color .3s;
      color: var(--dim);
    }
    #status.s-red { color: var(--red); text-shadow: 0 0 12px var(--red-glow); }
    #status.s-yel { color: var(--yel); text-shadow: 0 0 12px var(--yel-glow); }
    #status.s-draw{ color: var(--cyan); }

    /* ── Controls ── */
    #controls {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      padding: 9px 22px;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid;
      background: transparent;
      transition: background .2s, box-shadow .2s;
    }

    .btn-restart {
      border-color: rgba(76,201,255,.45);
      color: var(--cyan);
    }
    .btn-restart:hover {
      background: rgba(76,201,255,.1);
      box-shadow: 0 0 14px rgba(76,201,255,.2);
    }

    .btn-undo {
      border-color: rgba(221,232,255,.2);
      color: rgba(221,232,255,.45);
    }
    .btn-undo:not(:disabled):hover {
      border-color: rgba(221,232,255,.4);
      color: var(--text);
    }
    .btn-undo:disabled { opacity: .3; cursor: default; }

    /* ── Win overlay ── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(6,6,15,.75);
      backdrop-filter: blur(6px);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    #overlay.show { display: flex; }

    #overlay-box {
      text-align: center;
      padding: 48px 56px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(13,15,30,.92);
      box-shadow: 0 32px 80px rgba(0,0,0,.8);
      animation: popIn .35s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn {
      from { transform: scale(.7); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }

    #overlay-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    #overlay-title {
      font-family: 'Bungee', cursive;
      font-size: 2.4rem;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }
    #overlay-title.red { color: var(--red); text-shadow: 0 0 30px var(--red-glow); }
    #overlay-title.yel { color: var(--yel); text-shadow: 0 0 30px var(--yel-glow); }
    #overlay-title.draw { color: var(--cyan); text-shadow: 0 0 20px rgba(76,201,255,.6); }

    #overlay-sub {
      font-size: .75rem;
      letter-spacing: 3px;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    #overlay-btn {
      padding: 12px 36px;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: .8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid rgba(76,201,255,.5);
      background: rgba(76,201,255,.1);
      color: var(--cyan);
      transition: background .2s, box-shadow .2s;
    }
    #overlay-btn:hover {
      background: rgba(76,201,255,.2);
      box-shadow: 0 0 20px rgba(76,201,255,.3);
    }
  </style>
</head>
<body>
<div id="halo"></div>

<!-- Win overlay -->
<div id="overlay">
  <div id="overlay-box">
    <div id="overlay-icon">🏆</div>
    <div id="overlay-title"></div>
    <div id="overlay-sub"></div>
    <button id="overlay-btn">↺ 再来一局</button>
  </div>
</div>

<h1>CONNECT FOUR</h1>
<p id="sub">四子棋</p>

<div id="turn-bar">
  <div class="pip red" id="pip-red"></div>
  <span>红方</span>
  <span style="color:rgba(221,232,255,.2);margin:0 4px">·</span>
  <span>黄方</span>
  <div class="pip yel inactive" id="pip-yel"></div>
</div>

<div id="wrap">
  <div id="arrows"></div>
  <div id="board"></div>
</div>

<div id="scores">
  <div class="sc">
    <span class="sc-num red" id="sc-red">0</span>
    <span class="sc-label">红方</span>
  </div>
  <div class="sc-sep">胜场</div>
  <div class="sc">
    <span class="sc-num yel" id="sc-yel">0</span>
    <span class="sc-label">黄方</span>
  </div>
</div>

<div id="status">红方先手</div>

<div id="controls">
  <button class="btn btn-undo" id="btn-undo" disabled>↩ 撤销</button>
  <button class="btn btn-restart" id="btn-restart">↺ 重开</button>
</div>

<script>
const ROWS = 6, COLS = 7;
const CELL = 62 + 8; // cell size + gap

let board, cur, hist, over;
let scores = { red: 0, yel: 0 };

const boardEl    = document.getElementById('board');
const arrowsEl   = document.getElementById('arrows');
const statusEl   = document.getElementById('status');
const undoBtn    = document.getElementById('btn-undo');
const scRed      = document.getElementById('sc-red');
const scYel      = document.getElementById('sc-yel');
const pipRed     = document.getElementById('pip-red');
const pipYel     = document.getElementById('pip-yel');
const overlay    = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlaySub   = document.getElementById('overlay-sub');
const overlayIcon  = document.getElementById('overlay-icon');

function init() {
  board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  cur   = 'red';
  hist  = [];
  over  = false;
  overlay.classList.remove('show');
  buildDOM();
  reflect();
}

function buildDOM() {
  boardEl.innerHTML = '';
  arrowsEl.innerHTML = '';

  for (let c = 0; c < COLS; c++) {
    const btn = document.createElement('button');
    btn.className = 'arrow-btn';
    btn.addEventListener('click', () => drop(c));
    btn.addEventListener('mouseenter', () => {
      if (!over) btn.classList.add(cur === 'red' ? 'hover-red' : 'hover-yel');
    });
    btn.addEventListener('mouseleave', () => {
      btn.classList.remove('hover-red', 'hover-yel');
    });
    arrowsEl.appendChild(btn);
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cellEl = document.createElement('div');
      cellEl.className = 'cell';
      cellEl.dataset.r = r; cellEl.dataset.c = c;
      cellEl.addEventListener('click', () => drop(c));
      boardEl.appendChild(cellEl);
    }
  }
}

function cell(r, c) {
  return boardEl.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

function drop(col) {
  if (over) return;
  let row = -1;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (!board[r][col]) { row = r; break; }
  }
  if (row === -1) return;

  board[row][col] = cur;
  hist.push({ row, col, player: cur });

  const piece = document.createElement('div');
  piece.className = `piece ${cur}`;
  // start position: piece begins above the board, falls to target row
  const startY = -((row + 1) * CELL + 60);
  const dur = Math.min(0.18 + row * 0.055, 0.52);
  piece.style.setProperty('--start-y', `${startY}px`);
  piece.style.animationDuration = `${dur}s`;
  cell(row, col).appendChild(piece);

  if (row === 0) arrowsEl.children[col].disabled = true;
  undoBtn.disabled = false;

  // Refresh arrow hover class for column buttons
  Array.from(arrowsEl.children).forEach(btn => {
    btn.classList.remove('hover-red', 'hover-yel');
  });

  setTimeout(() => {
    const win = checkWin(row, col, cur);
    if (win) {
      win.forEach(([r, c]) => {
        const p = cell(r, c).querySelector('.piece');
        if (p) p.classList.add('winner');
      });
      scores[cur]++;
      scRed.textContent = scores.red;
      scYel.textContent = scores.yel;
      setStatus(cur === 'red' ? 's-red' : 's-yel', cur === 'red' ? '红方获胜！' : '黄方获胜！');
      over = true;
      setArrows(true);
      undoBtn.disabled = true;
      showOverlay(cur === 'red' ? 'red' : 'yel');
      return;
    }
    if (hist.length === ROWS * COLS) {
      setStatus('s-draw', '平局！');
      over = true; setArrows(true);
      undoBtn.disabled = true;
      showOverlay('draw');
      return;
    }
    cur = cur === 'red' ? 'yel' : 'red';
    reflect();
  }, dur * 1000 + 40);
}

function checkWin(row, col, player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    const line = [[row, col]];
    for (const s of [-1, 1]) {
      let r = row + dr*s, c = col + dc*s;
      while (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) {
        line.push([r, c]); r += dr*s; c += dc*s;
      }
    }
    if (line.length >= 4) return line;
  }
  return null;
}

function undo() {
  if (over || !hist.length) return;
  const { row, col, player } = hist.pop();
  board[row][col] = null;
  const p = cell(row, col).querySelector('.piece');
  if (p) p.remove();
  arrowsEl.children[col].disabled = false;
  cur = player;
  undoBtn.disabled = hist.length === 0;
  reflect();
}

function showOverlay(type) {
  overlayTitle.className = type;
  if (type === 'red') {
    overlayIcon.textContent = '🔴';
    overlayTitle.textContent = '红方获胜！';
    overlaySub.textContent = 'Red Wins';
  } else if (type === 'yel') {
    overlayIcon.textContent = '🟡';
    overlayTitle.textContent = '黄方获胜！';
    overlaySub.textContent = 'Yellow Wins';
  } else {
    overlayIcon.textContent = '🤝';
    overlayTitle.textContent = '平局！';
    overlaySub.textContent = 'Draw';
  }
  overlay.classList.add('show');
}

function setArrows(disabled) {
  Array.from(arrowsEl.children).forEach(b => b.disabled = disabled);
}

function setStatus(cls, msg) {
  statusEl.className = cls;
  statusEl.textContent = msg;
}

function reflect() {
  // Turn pips
  pipRed.classList.toggle('inactive', cur !== 'red');
  pipYel.classList.toggle('inactive', cur !== 'yel');
  setStatus('', cur === 'red' ? '红方落子' : '黄方落子');
}

document.getElementById('btn-restart').addEventListener('click', init);
document.getElementById('overlay-btn').addEventListener('click', init);
undoBtn.addEventListener('click', undo);

init();
</script>
</body>
</html>
