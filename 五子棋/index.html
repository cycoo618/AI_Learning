<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五子棋</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f1a;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(138, 92, 246, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(226, 185, 111, 0.06) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Noto Serif SC', 'Microsoft YaHei', serif;
      color: #e8e0d0;
      padding: 20px;
    }

    /* ── Title ── */
    .title-wrap {
      text-align: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 10px;
      background: linear-gradient(135deg, #f0c060 0%, #e2b96f 40%, #c8882a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 12px rgba(226,185,111,0.35));
    }

    .title-line {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #e2b96f, transparent);
      margin: 6px auto 0;
    }

    /* ── Mode selector ── */
    #mode-select {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50px;
      padding: 4px;
    }

    #mode-select label {
      position: relative;
      cursor: pointer;
    }

    #mode-select input[type="radio"] {
      display: none;
    }

    .mode-btn {
      display: block;
      padding: 7px 18px;
      border-radius: 50px;
      font-size: 0.88rem;
      color: #888;
      transition: all 0.25s ease;
      white-space: nowrap;
      font-family: inherit;
    }

    #mode-select input[type="radio"]:checked + .mode-btn {
      background: linear-gradient(135deg, #e2b96f, #c8882a);
      color: #1a0f00;
      font-weight: bold;
      box-shadow: 0 2px 12px rgba(226,185,111,0.4);
    }

    /* ── Info bar ── */
    #info {
      font-size: 1rem;
      margin-bottom: 14px;
      height: 30px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 1px;
    }

    .piece-dot {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 2px;
    }
    .piece-dot.black {
      background: radial-gradient(circle at 35% 35%, #888, #111);
      box-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }
    .piece-dot.white {
      background: radial-gradient(circle at 35% 35%, #fff, #bbb);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .winner-text {
      color: #f0c060;
      font-size: 1.1rem;
      font-weight: bold;
      animation: pulse 1s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 0.8; }
      to   { opacity: 1; filter: drop-shadow(0 0 8px rgba(240,192,96,0.6)); }
    }

    /* ── Board ── */
    #board-wrapper {
      position: relative;
      border-radius: 12px;
      padding: 3px;
      background: linear-gradient(135deg, #e2b96f44, #7a5c1e44, #e2b96f22);
      box-shadow:
        0 0 0 1px rgba(226,185,111,0.15),
        0 16px 48px rgba(0,0,0,0.7),
        0 4px 16px rgba(0,0,0,0.4);
    }

    #board-inner {
      border-radius: 10px;
      overflow: hidden;
      background: #c8a04a;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }

    /* ── Controls ── */
    #controls {
      margin-top: 18px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 26px;
      font-size: 0.95rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.15s;
    }
    button:hover::after { background: rgba(255,255,255,0.1); }
    button:active { transform: scale(0.96); }

    #btn-restart {
      background: linear-gradient(135deg, #e2b96f, #c8882a);
      color: #1a0f00;
      font-weight: bold;
      box-shadow: 0 4px 16px rgba(226,185,111,0.3);
    }

    #btn-restart:hover {
      box-shadow: 0 6px 20px rgba(226,185,111,0.45);
      transform: translateY(-1px);
    }

    #btn-undo {
      background: rgba(255,255,255,0.07);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.12);
    }

    #btn-undo:hover {
      background: rgba(255,255,255,0.12);
      color: #eee;
      transform: translateY(-1px);
    }

    /* ── Score / status strip ── */
    #score-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 14px;
      font-size: 0.82rem;
      color: #666;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="title-wrap">
    <h1>五 子 棋</h1>
    <div class="title-line"></div>
  </div>

  <div id="mode-select">
    <label>
      <input type="radio" name="mode" value="pvp" checked>
      <span class="mode-btn">双人对战</span>
    </label>
    <label>
      <input type="radio" name="mode" value="pvc">
      <span class="mode-btn">人机对战</span>
    </label>
  </div>

  <div id="info">
    <span class="piece-dot black"></span>黑棋先行
  </div>

  <div id="board-wrapper">
    <div id="board-inner">
      <canvas id="board" width="570" height="570"></canvas>
    </div>
  </div>

  <div id="controls">
    <button id="btn-undo">悔 棋</button>
    <button id="btn-restart">重新开始</button>
  </div>

<script>
const BOARD_SIZE = 15;
const CELL = 38;
const PADDING = 20;
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');

let board = [];
let currentPlayer = 1; // 1=black, 2=white
let gameOver = false;
let history = [];
let mode = 'pvp';
let hoverCell = null; // {r, c}

function initBoard() {
  board = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(0));
  currentPlayer = 1;
  gameOver = false;
  history = [];
  hoverCell = null;
  updateInfo();
  drawBoard();
}

document.querySelectorAll('input[name="mode"]').forEach(r => {
  r.addEventListener('change', e => { mode = e.target.value; initBoard(); });
});

// ── Drawing ──────────────────────────────────────────────────────────────────

function px(i) { return PADDING + i * CELL; }

function drawBoard() {
  // Wood gradient background
  const woodGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  woodGrad.addColorStop(0,   '#d4a84b');
  woodGrad.addColorStop(0.4, '#c8a04a');
  woodGrad.addColorStop(0.7, '#bb9240');
  woodGrad.addColorStop(1,   '#c4983e');
  ctx.fillStyle = woodGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle wood grain lines
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.strokeStyle = '#7a5010';
  ctx.lineWidth = 1;
  for (let i = 0; i < canvas.height; i += 9) {
    ctx.beginPath();
    ctx.moveTo(0, i + Math.sin(i * 0.05) * 3);
    ctx.lineTo(canvas.width, i + Math.sin(i * 0.05 + 1) * 3);
    ctx.stroke();
  }
  ctx.restore();

  // Grid lines
  ctx.strokeStyle = 'rgba(90, 55, 10, 0.7)';
  ctx.lineWidth = 0.8;
  for (let i = 0; i < BOARD_SIZE; i++) {
    ctx.beginPath(); ctx.moveTo(px(i), px(0)); ctx.lineTo(px(i), px(BOARD_SIZE - 1)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(0), px(i)); ctx.lineTo(px(BOARD_SIZE - 1), px(i)); ctx.stroke();
  }

  // Star points
  const stars = [3, 7, 11];
  ctx.fillStyle = 'rgba(80, 45, 8, 0.8)';
  for (const r of stars) for (const c of stars) {
    ctx.beginPath(); ctx.arc(px(c), px(r), 4, 0, Math.PI * 2); ctx.fill();
  }

  // Hover ghost piece
  if (hoverCell && !gameOver && board[hoverCell.r][hoverCell.c] === 0) {
    const x = px(hoverCell.c), y = px(hoverCell.r), radius = CELL / 2 - 3;
    ctx.save();
    ctx.globalAlpha = 0.3;
    drawPieceAt(x, y, radius, currentPlayer);
    ctx.restore();
  }

  // Pieces
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      if (board[r][c]) drawPiece(r, c, board[r][c]);
    }
  }

  // Highlight last move
  if (history.length > 0) {
    const last = history[history.length - 1];
    const x = px(last.c), y = px(last.r);
    ctx.strokeStyle = last.p === 1 ? 'rgba(255,80,80,0.9)' : 'rgba(255,80,80,0.7)';
    ctx.lineWidth = 1.5;
    const s = 5;
    ctx.beginPath();
    ctx.moveTo(x - s, y); ctx.lineTo(x + s, y);
    ctx.moveTo(x, y - s); ctx.lineTo(x, y + s);
    ctx.stroke();
  }
}

function drawPieceAt(x, y, radius, player) {
  const grad = ctx.createRadialGradient(x - radius*0.3, y - radius*0.3, radius*0.05, x + radius*0.1, y + radius*0.1, radius);
  if (player === 1) {
    grad.addColorStop(0, '#aaa');
    grad.addColorStop(0.3, '#555');
    grad.addColorStop(1, '#0a0a0a');
  } else {
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.3, '#e8e8e8');
    grad.addColorStop(1, '#a0a0a0');
  }
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Edge shadow
  ctx.strokeStyle = player === 1 ? 'rgba(0,0,0,0.8)' : 'rgba(120,120,120,0.6)';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // Highlight gloss
  const gloss = ctx.createRadialGradient(x - radius*0.35, y - radius*0.38, 0, x - radius*0.15, y - radius*0.15, radius * 0.6);
  gloss.addColorStop(0, player === 1 ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.55)');
  gloss.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fillStyle = gloss;
  ctx.fill();
}

function drawPiece(r, c, player) {
  const x = px(c), y = px(r), radius = CELL / 2 - 2;
  // Drop shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 3;
  drawPieceAt(x, y, radius, player);
  ctx.restore();
}

// ── Game Logic ────────────────────────────────────────────────────────────────

function checkWin(r, c, p) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let count = 1;
    for (let d = 1; d < 5; d++) {
      const nr = r + dr*d, nc = c + dc*d;
      if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE || board[nr][nc] !== p) break;
      count++;
    }
    for (let d = 1; d < 5; d++) {
      const nr = r - dr*d, nc = c - dc*d;
      if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE || board[nr][nc] !== p) break;
      count++;
    }
    if (count >= 5) return true;
  }
  return false;
}

function place(r, c) {
  if (gameOver || board[r][c]) return;
  board[r][c] = currentPlayer;
  history.push({ r, c, p: currentPlayer });
  drawBoard();
  if (checkWin(r, c, currentPlayer)) {
    gameOver = true;
    const name = currentPlayer === 1 ? '黑棋' : '白棋';
    const dotClass = currentPlayer === 1 ? 'black' : 'white';
    info.innerHTML = `<span class="winner-text"><span class="piece-dot ${dotClass}"></span>${name} 获胜！🎉</span>`;
    return;
  }
  currentPlayer = currentPlayer === 1 ? 2 : 1;
  updateInfo();

  if (mode === 'pvc' && currentPlayer === 2 && !gameOver) {
    canvas.style.pointerEvents = 'none';
    setTimeout(() => {
      aiMove();
      canvas.style.pointerEvents = '';
    }, 220);
  }
}

function updateInfo() {
  if (gameOver) return;
  const name = currentPlayer === 1 ? '黑棋' : '白棋';
  const dotClass = currentPlayer === 1 ? 'black' : 'white';
  const thinking = (mode === 'pvc' && currentPlayer === 2) ? ' 思考中…' : ' 落子';
  info.innerHTML = `<span class="piece-dot ${dotClass}"></span>${name}${thinking}`;
}

// ── AI (heuristic scoring) ────────────────────────────────────────────────────

function aiMove() {
  const move = getBestMove();
  if (move) place(move.r, move.c);
}

function scoreSequence(b, r, c, dr, dc, player) {
  let count = 0, open = 0;
  let nr = r + dr, nc = c + dc;
  while (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && b[nr][nc] === player) {
    count++; nr += dr; nc += dc;
  }
  if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && b[nr][nc] === 0) open++;
  nr = r - dr; nc = c - dc;
  while (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && b[nr][nc] === player) {
    count++; nr -= dr; nc -= dc;
  }
  if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && b[nr][nc] === 0) open++;
  return { count, open };
}

function evalCell(r, c, player) {
  if (board[r][c] !== 0) return -Infinity;
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  let score = 0;
  board[r][c] = player;
  for (const [dr, dc] of dirs) {
    const { count, open } = scoreSequence(board, r, c, dr, dc, player);
    const total = count + 1;
    if (total >= 5)            score += 100000;
    else if (total === 4 && open === 2) score += 10000;
    else if (total === 4 && open === 1) score += 1000;
    else if (total === 3 && open === 2) score += 500;
    else if (total === 3 && open === 1) score += 100;
    else if (total === 2 && open === 2) score += 50;
    else if (total === 2 && open === 1) score += 10;
  }
  board[r][c] = 0;
  return score;
}

function getBestMove() {
  let best = null, bestScore = -Infinity;
  const candidates = getCandidates();
  for (const [r, c] of candidates) {
    const attackScore  = evalCell(r, c, 2);
    const defenseScore = evalCell(r, c, 1);
    const score = attackScore * 1.1 + defenseScore;
    if (score > bestScore) { bestScore = score; best = { r, c }; }
  }
  if (!best) best = { r: 7, c: 7 };
  return best;
}

function getCandidates() {
  const visited = new Set();
  const result = [];
  const RANGE = 2;
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      if (board[r][c] === 0) continue;
      for (let dr = -RANGE; dr <= RANGE; dr++) {
        for (let dc = -RANGE; dc <= RANGE; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) continue;
          if (board[nr][nc] !== 0) continue;
          const key = nr * BOARD_SIZE + nc;
          if (!visited.has(key)) { visited.add(key); result.push([nr, nc]); }
        }
      }
    }
  }
  if (result.length === 0) result.push([7, 7]);
  return result;
}

// ── Event Handlers ────────────────────────────────────────────────────────────

function getCellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const touch = e.touches ? e.touches[0] : e;
  const x = (touch.clientX - rect.left) * scaleX;
  const y = (touch.clientY - rect.top) * scaleY;
  const c = Math.round((x - PADDING) / CELL);
  const r = Math.round((y - PADDING) / CELL);
  if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE) return { r, c };
  return null;
}

canvas.addEventListener('mousemove', e => {
  const cell = getCellFromEvent(e);
  if (!cell || (hoverCell && hoverCell.r === cell.r && hoverCell.c === cell.c)) return;
  hoverCell = cell;
  drawBoard();
});

canvas.addEventListener('mouseleave', () => {
  hoverCell = null;
  drawBoard();
});

canvas.addEventListener('click', e => {
  if (gameOver) return;
  if (mode === 'pvc' && currentPlayer === 2) return;
  const cell = getCellFromEvent(e);
  if (cell) place(cell.r, cell.c);
});

document.getElementById('btn-restart').addEventListener('click', initBoard);

document.getElementById('btn-undo').addEventListener('click', () => {
  if (gameOver) { gameOver = false; }
  if (mode === 'pvc') {
    if (history.length >= 2) { history.pop(); history.pop(); }
    else if (history.length === 1) { history.pop(); }
  } else {
    if (history.length > 0) history.pop();
  }
  board = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(0));
  history.forEach(({ r, c, p }) => { board[r][c] = p; });
  currentPlayer = history.length % 2 === 0 ? 1 : 2;
  updateInfo();
  drawBoard();
});

// Start
initBoard();
</script>
</body>
</html>
